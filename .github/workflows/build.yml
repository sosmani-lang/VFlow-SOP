name: Build Windows EXE and macOS DMG

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Windows EXE
        run: npm run build

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: VFlowRecorder-Setup-Windows
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build macOS DMG
        run: npx electron-builder --mac dmg --publish never

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: VFlowRecorder-Setup-macOS
          path: dist/*.dmg
