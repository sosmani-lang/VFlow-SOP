appId: ca.vflowapps.recorder
productName: VFlow Recorder
directories:
  output: dist
  buildResources: assets
files:
  - src/**/*
  - assets/**/*
  - package.json
  - "!**/*.map"
asar: true
extraResources:
  - from: node_modules/electron/dist/ffmpeg.dll
    to: ffmpeg.dll
    filter: ["**/*"]
win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  artifactName: VFlowRecorder-Setup-${version}.${ext}
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: VFlow Recorder
publish: null
